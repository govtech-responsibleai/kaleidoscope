services:
  db:
    image: postgres:16-alpine
    container_name: kaleidoscope-db
    environment:
      POSTGRES_USER: kaleidoscope
      POSTGRES_PASSWORD: kaleidoscope_dev_password
      POSTGRES_DB: kaleidoscope
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaleidoscope"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kaleidoscope-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kaleidoscope-backend
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://kaleidoscope:kaleidoscope_dev_password@db:5432/kaleidoscope
      DATABASE_ECHO: "False"
      OTEL_EXPORTER_OTLP_CERTIFICATE: /etc/ssl/certs/ca-certificates.crt
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      LOG_LEVEL: "INFO"
      API_TITLE: Kaleidoscope API
      API_VERSION: 1.0.0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - kaleidoscope-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kaleidoscope-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - kaleidoscope-network

volumes:
  postgres_data:

networks:
  kaleidoscope-network:
    driver: bridge
